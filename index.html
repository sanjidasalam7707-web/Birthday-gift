<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Arial', sans-serif;
    }

    body {
        min-height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .container {
        text-align: center;
        z-index: 10;
        padding: 20px;
        width: 90%;
        max-width: 500px;
    }

    .card {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 30px 20px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        animation: popIn 1s ease;
    }

    h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        color: white;
        margin-bottom: 15px;
    }

    p {
        font-size: clamp(1rem, 4vw, 1.2rem);
        color: white;
        line-height: 1.6;
        margin-bottom: 20px;
    }

    button {
        background: white;
        color: #ff4d6d;
        border: none;
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.08);
    }

    .balloon {
        position: absolute;
        bottom: -150px;
        width: 50px;
        height: 65px;
        border-radius: 50%;
        animation: floatUp 10s linear infinite;
    }

    .balloon::after {
        content: '';
        position: absolute;
        width: 2px;
        height: 60px;
        background: white;
        left: 50%;
        top: 65px;
    }

    .b1 { left: 10%; background: #ff4d6d; animation-delay: 0s; }
    .b2 { left: 30%; background: #ffd166; animation-delay: 3s; }
    .b3 { left: 50%; background: #06d6a0; animation-delay: 6s; }
    .b4 { left: 70%; background: #118ab2; animation-delay: 2s; }
    .b5 { left: 90%; background: #9b5de5; animation-delay: 5s; }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
    }

    @keyframes floatUp {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-120vh);
            opacity: 0;
        }
    }

    @keyframes popIn {
        from {
            transform: scale(0.7);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    @media (max-width: 480px) {
        .card {
            padding: 25px 15px;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

<div class="container">
    <div class="card">
        <h1>"HAPPY BIRTHDAY" 🎉 my Jolpora🧜🎂</h1>
        <p>
            Wishing you endless happiness, laughter, love, and beautiful memories today and always 💖✨
        </p>
        <button onclick="burstConfetti()">Celebrate 🎊</button>
    </div>
</div>

<script>
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function createConfetti(count = 150) {
    for (let i = 0; i < count; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 100 + 10,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`,
            tilt: Math.random() * 10 - 10,
            tiltAngleIncrement: Math.random() * 0.07 + 0.05,
            tiltAngle: 0
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach((c, index) => {
        c.tiltAngle += c.tiltAngleIncrement;
        c.y += 2;
        c.tilt = Math.sin(c.tiltAngle) * 15;

        ctx.beginPath();
        ctx.lineWidth = c.r;
        ctx.strokeStyle = c.color;
        ctx.moveTo(c.x + c.tilt, c.y);
        ctx.lineTo(c.x, c.y + c.tilt);
        ctx.stroke();

        if (c.y > canvas.height) {
            confetti[index] = {
                ...c,
                y: -20,
                x: Math.random() * canvas.width
            };
        }
    });

    requestAnimationFrame(drawConfetti);
}

function burstConfetti() {
    createConfetti(200);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

createConfetti();
drawConfetti();
</script>

</body>
</html>
